<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit your company information for the NQU Job Fair">
  <title>Submit Information — NQU Job Fair</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-wrapper">

    <nav class="nav">
      <div class="nav__inner">
        <a href="/" class="nav__brand">
          <span>NQU</span> <span class="nav__brand-accent" data-i18n="nav.brand">Job Fair</span>
        </a>
        <ul class="nav__links">
          <li><a href="/employer/dashboard.html" class="nav__link" data-i18n="submit.back">← Dashboard</a></li>
          <li><a href="#" class="nav__link" onclick="App.logout(); return false;" data-i18n="nav.logout">Logout</a></li>
          <li id="langToggle"></li>
        </ul>
      </div>
    </nav>

    <div class="page-content">
      <div class="container container--medium" style="padding-top:var(--space-8); padding-bottom:var(--space-16);">

        <h1 class="dashboard__title fade-in-up" id="pageTitle" data-i18n="submit.title">Registration</h1>
        <p class="text-muted text-sm mt-2 mb-6 fade-in-up stagger-1" data-i18n="submit.subtitle">Please fill in the details below.</p>

        <form id="submitForm" class="fade-in-up stagger-2">
          <!-- Section 1: Registration Category -->
          <div class="card mb-6">
            <h2 class="card__title" data-i18n="submit.sec1">Part 1: Category</h2>
            
            <div class="form-group">
              <label class="form-label"><span data-i18n="submit.catLabel">Category</span> *</label>
              <div class="radio-stack">
                <label class="radio-label">
                  <input type="radio" name="activity_category" value="Recruitment" required onchange="toggleSections()">
                  <span data-i18n="submit.catRecruit">Recruitment</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="activity_category" value="Resume" onchange="toggleSections()">
                  <span data-i18n="submit.catResume">Resume</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="activity_category" value="PublicWelfare" onchange="toggleSections()">
                  <span data-i18n="submit.catPublic">Public Welfare</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Section 2: Core Info (Common) -->
          <div id="sectionCore" class="card mb-6">
            <h2 class="card__title" data-i18n="submit.sec2">Part 2: Basic Info</h2>

            <div class="form-group">
              <label class="form-label"><span data-i18n="submit.isPrev">Previously Participated?</span> *</label>
              <div class="radio-group">
                <label class="radio-label"><input type="radio" name="is_previous_participant" value="Yes" required><span data-i18n="submit.yes">Yes</span></label>
                <label class="radio-label"><input type="radio" name="is_previous_participant" value="No"><span data-i18n="submit.no">No</span></label>
                <label class="radio-label"><input type="radio" name="is_previous_participant" value="Not Sure"><span data-i18n="submit.unsure">Not Sure</span></label>
              </div>
            </div>

            <div class="grid grid--2 gap-4">
              <div class="form-group">
                <label class="form-label" for="companyName"><span data-i18n="submit.companyName">Company Name</span> *</label>
                <input class="form-input" type="text" id="companyName" name="companyName" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="boothSignboardName"><span data-i18n="submit.boothName">Booth Name</span> *</label>
                <input class="form-input" type="text" id="boothSignboardName" name="boothSignboardName" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"><span data-i18n="submit.logo">Logo</span></label>
              <div class="file-upload">
                <input type="file" id="logo" name="logo" accept="image/*">
                <div class="file-upload__icon">🖼️</div>
                <div class="file-upload__text" data-i18n="submit.logo">Click to upload</div>
                <div id="logoPreview" style="margin-top:var(--space-3); display:none;">
                  <img id="logoPreviewImg" class="logo-preview--lg" style="margin:0 auto;">
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="companyIntro"><span data-i18n="submit.intro">Introduction</span> *</label>
              <textarea class="form-textarea" id="companyIntro" name="companyIntro" rows="3" required></textarea>
            </div>

            <div class="grid grid--2 gap-4">
              <div class="form-group">
                <label class="form-label" for="ceoName"><span data-i18n="submit.ceoName">CEO Name</span> *</label>
                <input class="form-input" type="text" id="ceoName" name="ceoName" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="taxId"><span data-i18n="submit.taxId">Tax ID</span> *</label>
                <input class="form-input" type="text" id="taxId" name="taxId" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="industry"><span data-i18n="submit.industry">Industry</span> *</label>
              <select class="form-select" id="industry" name="industry" required>
                <!-- Generated by JS -->
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="mainProducts"><span data-i18n="submit.mainProducts">Main Products</span> *</label>
              <textarea class="form-textarea" id="mainProducts" name="mainProducts" rows="2" required></textarea>
            </div>
          </div>

          <!-- Section 3: Recruitment & Internship (Conditional) -->
          <div id="sectionRecruit" class="card mb-6">
            <h2 class="card__title" data-i18n="submit.sec3">Part 3: Recruitment & Internship</h2>
            
            <div class="form-group">
              <label class="form-label"><span data-i18n="submit.internship">Internship History</span> *</label>
              <div class="checkbox-grid" id="internshipList">
                <!-- Generated by JS -->
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"><span data-i18n="submit.targetDeps">Target Departments</span> *</label>
              <div class="checkbox-grid" id="deptList">
                <!-- Generated by JS -->
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="jobPositions"><span data-i18n="submit.positions">Positions</span> *</label>
              <textarea class="form-textarea" id="jobPositions" name="jobPositions" rows="3" placeholder="Engineer: 2, Manager: 1"></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="requirements"><span data-i18n="submit.requirements">Requirements</span></label>
              <textarea class="form-textarea" id="requirements" name="requirements" rows="2"></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="benefits"><span data-i18n="submit.benefits">Benefits</span></label>
              <textarea class="form-textarea" id="benefits" name="benefits" rows="2"></textarea>
            </div>
            
            <div class="grid grid--2 gap-4">
              <div class="form-group">
                <label class="form-label" for="mailingAddress"><span data-i18n="submit.mailingAddr">Mailing Address</span> *</label>
                <input class="form-input" type="text" id="mailingAddress" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="contactInfoDetail"><span data-i18n="submit.contactInfo">Contact Info</span> *</label>
                <textarea class="form-input" id="contactInfoDetail" rows="1" required></textarea>
              </div>
            </div>
            <!-- Hidden inputs for backward compatibility with existing API if needed, 
                 but we'll map them in JS from contactInfoDetail -->
            <input type="hidden" id="contactPerson">
            <input type="hidden" id="contactEmail">
            <input type="hidden" id="contactPhone">
          </div>

          <!-- Section 4: Public Welfare (Conditional) -->
          <div id="sectionPublic" class="card mb-6" style="display:none;">
            <h2 class="card__title" data-i18n="submit.sec4">Part 4: Public Welfare</h2>
            <div class="form-group">
              <label class="form-label"><span data-i18n="submit.groupType">Group Type</span> *</label>
              <div class="radio-stack">
                <label class="radio-label"><input type="radio" name="group_type" value="social"><span data-i18n="submit.groupSocial">Social</span></label>
                <label class="radio-label"><input type="radio" name="group_type" value="prof"><span data-i18n="submit.groupProf">Professional</span></label>
                <label class="radio-label"><input type="radio" name="group_type" value="intl_office"><span data-i18n="submit.groupIntlOff">Intl Office</span></label>
                <label class="radio-label"><input type="radio" name="group_type" value="intl_org"><span data-i18n="submit.groupIntlNGO">Intl NGO</span></label>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="establishment_date"><span data-i18n="submit.estDate">Est. Date</span> *</label>
              <input class="form-input" type="text" id="establishment_date" placeholder="YYYY/MM/DD">
            </div>
          </div>

          <!-- Section 5: Logistics -->
          <div id="sectionLogistics" class="card mb-6">
            <h2 class="card__title" data-i18n="submit.sec5">Part 5: Logistics</h2>
            <div class="form-group">
              <label class="form-label" for="attendeeMain"><span data-i18n="submit.attendeeMain">Main Attendee</span> *</label>
              <input class="form-input" type="text" id="attendeeMain" placeholder="John Doe / Manager / 0912-345678" required>
            </div>
            
            <div class="form-group">
              <label class="form-label" data-i18n="submit.attendeeCount">Total Attendees *</label>
              <div class="radio-group">
                <label class="radio-label"><input type="radio" name="attendee_count" value="1" required>1</label>
                <label class="radio-label"><input type="radio" name="attendee_count" value="2">2</label>
                <label class="radio-label"><input type="radio" name="attendee_count" value="3">3</label>
              </div>
            </div>

            <div class="grid grid--2 gap-4">
              <div class="form-group">
                <label class="form-label" data-i18n="submit.lunchNonVeg">Non-Veg Lunch *</label>
                <div class="radio-group">
                  <label class="radio-label"><input type="radio" name="lunch_box_non_veg" value="0" required>0</label>
                  <label class="radio-label"><input type="radio" name="lunch_box_non_veg" value="1">1</label>
                  <label class="radio-label"><input type="radio" name="lunch_box_non_veg" value="2">2</label>
                  <label class="radio-label"><input type="radio" name="lunch_box_non_veg" value="3">3</label>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" data-i18n="submit.lunchVeg">Veg Lunch *</label>
                <div class="radio-group">
                  <label class="radio-label"><input type="radio" name="lunch_box_veg" value="0" required>0</label>
                  <label class="radio-label"><input type="radio" name="lunch_box_veg" value="1">1</label>
                  <label class="radio-label"><input type="radio" name="lunch_box_veg" value="2">2</label>
                  <label class="radio-label"><input type="radio" name="lunch_box_veg" value="3">3</label>
                </div>
              </div>
            </div>
            <p class="text-xs text-muted mb-4" data-i18n="submit.lunchHint">Max 3 total</p>

            <div class="form-group">
              <label class="form-label" data-i18n="submit.parking">Parking Spaces *</label>
              <div class="radio-group">
                <label class="radio-label"><input type="radio" name="parking_spaces" value="0" required>0</label>
                <label class="radio-label"><input type="radio" name="parking_spaces" value="1">1</label>
                <label class="radio-label"><input type="radio" name="parking_spaces" value="2">2</label>
                <label class="radio-label"><input type="radio" name="parking_spaces" value="3">3</label>
                <label class="radio-label"><input type="radio" name="parking_spaces" value="4">4</label>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="rafflePrizes"><span data-i18n="submit.raffle">Raffle Prizes</span></label>
              <textarea class="form-textarea" id="rafflePrizes" rows="1"></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="otherRequirements"><span data-i18n="submit.otherReq">Other</span></label>
              <textarea class="form-textarea" id="otherRequirements" rows="2"></textarea>
            </div>
          </div>

          <div id="errorMsg" class="form-error mb-4" style="display:none;"></div>

          <div style="display:flex; gap:var(--space-3); justify-content:flex-end;">
            <a href="/employer/dashboard.html" class="btn btn--outline" data-i18n="adm.cancel">Cancel</a>
            <button type="submit" class="btn btn--primary btn--lg" id="submitBtn" data-i18n="submit.submitBtn">Submit</button>
          </div>
        </form>

      </div>
    </div>

    <footer class="footer">
      <div class="container">
        <div class="footer__brand">NQU <span class="gold" data-i18n="nav.brand">Job Fair</span></div>
        <p data-i18n="footer.uni">National Quemoy University</p>
      </div>
    </footer>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    let editId = null;
    let compressedLogoBlob = null;

    async function init() {
      const user = await App.requireAuth('employer');
      if (!user) return;
      I18N.init('langToggle');

      // Populate Industry List
      const industrySelect = document.getElementById('industry');
      industrySelect.innerHTML = `<option value="">${I18N.t('adm.loading')}</option>`;
      
      const it = I18N.it();
      const inds = it.ind || {}; 
      industrySelect.innerHTML = `<option value="">${I18N.t('submit.selectIndustry')}</option>`;
      Object.keys(inds).sort().forEach(key => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = inds[key];
        industrySelect.appendChild(opt);
      });

      // Populate Dept Lists
      const depts = it.dep || {};
      const internshipList = document.getElementById('internshipList');
      const deptList = document.getElementById('deptList');
      
      internshipList.innerHTML = '';
      deptList.innerHTML = '';

      Object.keys(depts).forEach(key => {
        // Internship (Has 'None')
        if (key !== 'unlimited') {
          const iLabel = document.createElement('label');
          iLabel.className = 'checkbox-label';
          iLabel.innerHTML = `<input type="checkbox" name="internship_history" value="${key}"> <span>${depts[key]}</span>`;
          internshipList.appendChild(iLabel);
        }

        // Depts (Has 'Unlimited')
        if (key !== 'none') {
          const dLabel = document.createElement('label');
          dLabel.className = 'checkbox-label';
          dLabel.innerHTML = `<input type="checkbox" name="target_departments" value="${key}"> <span>${depts[key]}</span>`;
          deptList.appendChild(dLabel);
        }
      });

      // Check for edit mode
      const urlParams = new URLSearchParams(window.location.search);
      editId = urlParams.get('id');
      if (editId) {
        document.getElementById('pageTitle').setAttribute('data-i18n', 'submit.titleEdit');
        document.getElementById('submitBtn').setAttribute('data-i18n', 'submit.updateBtn');
        I18N.applyAll();
        loadSubmission(editId);
      } else {
        toggleSections(); // Initial numbering
      }
    }

    function toggleSections() {
      const cat = document.querySelector('input[name="activity_category"]:checked')?.value;
      const secRecruit = document.getElementById('sectionRecruit');
      const secPublic = document.getElementById('sectionPublic');
      
      if (cat === 'PublicWelfare') {
        secRecruit.style.display = 'none';
        secPublic.style.display = 'block';
      } else {
        secRecruit.style.display = 'block';
        secPublic.style.display = 'none';
      }
          'establishment_date', 'attendeeMain'
        ];
        fields.forEach(f => {
          const el = document.getElementById(f);
          if (el) el.value = s[f.replace(/[A-Z]/g, l => `_${l.toLowerCase()}`)] || s[f] || '';
        });

        // Combined contact info logic (approximate restore)
        document.getElementById('contactInfoDetail').value = `${s.contact_person || ''} / ${s.contact_email || ''} / ${s.contact_phone || ''}`;

        // Radios
        const radios = [
          'activity_category', 'is_previous_participant', 'attendee_count',
          'lunch_box_non_veg', 'lunch_box_veg', 'parking_spaces', 'group_type'
        ];
        radios.forEach(name => {
          const val = s[name];
          const el = document.querySelector(`input[name="${name}"][value="${val}"]`);
          if (el) el.checked = true;
        });

        // Checkboxes
        const checkSets = ['target_departments', 'internship_cooperation'];
        checkSets.forEach(name => {
          if (s[name]) {
            const vals = s[name].split(',');
            vals.forEach(v => {
              const el = document.querySelector(`input[name="${name}"][value="${v}"]`);
              if (el) el.checked = true;
            });
          }
        });

        if (s.logo_path) {
          document.getElementById('logoPreviewImg').src = s.logo_path;
          document.getElementById('logoPreview').style.display = 'block';
        }
      } catch (err) {
        App.toast('Failed to load', 'error');
      }
    }

    // Logo upload
    document.getElementById('logo').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 400; canvas.height = 400;
            ctx.drawImage(img, 0, 0, 400, 400);
            canvas.toBlob(blob => {
              compressedLogoBlob = blob;
              document.getElementById('logoPreviewImg').src = canvas.toDataURL('image/jpeg');
              document.getElementById('logoPreview').style.display = 'block';
            }, 'image/jpeg', 0.82);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('submitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;

      const formData = new FormData();
      
      // Text inputs
      const textFields = [
        'companyName', 'boothSignboardName', 'ceoName', 'taxId', 'industry',
        'companyIntro', 'mainProducts', 'mailingAddress', 'jobPositions',
        'requirements', 'benefits', 'rafflePrizes', 'otherRequirements',
        'establishment_date', 'attendeeMain'
      ];
      textFields.forEach(f => {
        const dbKey = f.replace(/[A-Z]/g, l => `_${l.toLowerCase()}`);
        formData.append(dbKey, document.getElementById(f).value);
      });

      // Contact Parsing
      const contactRaw = document.getElementById('contactInfoDetail').value;
      const parts = contactRaw.split('/').map(p => p.trim());
      formData.append('contact_person', parts[0] || '');
      formData.append('contact_email', parts[1] || '');
      formData.append('contact_phone', parts[2] || '');

      // Radios
      const radios = [
        'activity_category', 'is_previous_participant', 'attendee_count',
        'lunch_box_non_veg', 'lunch_box_veg', 'parking_spaces', 'group_type'
      ];
      radios.forEach(name => {
        const sel = document.querySelector(`input[name="${name}"]:checked`);
        if (sel) formData.append(name, sel.value);
      });

      // Checkboxes
      const checkSets = ['target_departments', 'internship_cooperation'];
      checkSets.forEach(name => {
        const vals = Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(c => c.value);
        formData.append(name, vals.join(','));
      });

      if (compressedLogoBlob) formData.append('logo', compressedLogoBlob, 'logo.jpg');

      try {
        if (editId) {
          await API.upload(`/api/submissions/${editId}`, formData, 'PUT');
        } else {
          await API.upload('/api/submissions', formData);
        }
        App.toast('Success', 'success');
        setTimeout(() => window.location.href = '/employer/dashboard.html', 1000);
      } catch (err) {
        document.getElementById('errorMsg').textContent = err.message;
        document.getElementById('errorMsg').style.display = 'block';
        submitBtn.disabled = false;
      }
    });

    function onI18nApplied() {
      if (typeof renumberSections === 'function') {
        renumberSections();
      }
    }

    init();
  </script>
</body>
</html>
