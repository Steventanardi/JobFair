<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Employer login for NQU Job Fair System">
  <title>Employer Login — NQU Job Fair</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in-up">
      <div class="auth-card__logo">
        <a href="/" class="auth-card__logo-text" style="text-decoration:none; display:block; color:inherit;">
          NQU <span class="auth-card__logo-accent" data-i18n="nav.brand">Job Fair</span>
        </a>
        <div style="margin-top:var(--space-3);" id="langToggle"></div>
      </div>

      <h1 class="auth-card__title" data-i18n="empLogin.title">Employer Login</h1>
      <p class="auth-card__subtitle" data-i18n="empLogin.subtitle">Sign in to manage your submission</p>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="email" data-i18n="empLogin.email">Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="company@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password" data-i18n="empLogin.password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••" required autocomplete="current-password">
        </div>

        <div id="errorMsg" class="form-error mb-4" style="display:none;"></div>

        <button type="submit" class="btn btn--primary btn--full btn--lg" id="submitBtn" data-i18n="empLogin.submit">
          Sign In
        </button>
      </form>

      <div class="auth-card__footer">
        <span data-i18n="empLogin.noAccount">Don't have an account?</span><br>
        <a href="/employer/register.html" style="font-weight:600;" data-i18n="empLogin.registerLink">Register here</a>
      </div>

      <div style="text-align:center; margin-top:var(--space-3); padding-top:var(--space-3); border-top:1px solid var(--color-border);">
        <p class="text-sm" style="color:var(--color-text-muted);">
          <span data-i18n="empLogin.forgot">Forgot your password?</span><br>
          <span class="text-xs" data-i18n="empLogin.forgotTip">Contact the admin to reset it.</span>
        </p>
      </div>


    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    I18N.init('langToggle');

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = I18N.t('empLogin.submitting');

      try {
        await API.post('/api/auth/employer/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        App.toast(I18N.t('msg.loginSuccess'), 'success');
        setTimeout(() => window.location.href = '/employer/dashboard.html', 500);
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = I18N.t('empLogin.submit');
      }
    });

    API.checkAuth().then(user => {
      if (user && user.role === 'employer') window.location.href = '/employer/dashboard.html';
    });
  </script>
</body>
</html>
